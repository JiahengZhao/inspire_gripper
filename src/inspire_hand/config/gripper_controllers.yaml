controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_gripper_controller:
      type: position_controllers/GripperActionController

    right_gripper_controller:
      type: position_controllers/GripperActionController

left_gripper_controller:
  ros__parameters:
    joint: left_gripper_joint1
    # A physical gripper stalls at its limits or when grasping an object;
    # treat that as success, not failure.
    allow_stalling: true
    goal_tolerance: 0.05
    stall_velocity_threshold: 0.005
    stall_timeout: 0.3

right_gripper_controller:
  ros__parameters:
    joint: right_gripper_joint1
    allow_stalling: true
    goal_tolerance: 0.05
    stall_velocity_threshold: 0.005
    stall_timeout: 0.3
