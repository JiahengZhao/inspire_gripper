controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_gripper_controller:
      type: parallel_gripper_action_controller/GripperActionController

    right_gripper_controller:
      type: parallel_gripper_action_controller/GripperActionController

left_gripper_controller:
  ros__parameters:
    joint: left_gripper_joint1
    max_effort: 500.0
    max_velocity: 1.0

right_gripper_controller:
  ros__parameters:
    joint: right_gripper_joint1
    max_effort: 500.0
    max_velocity: 1.0
